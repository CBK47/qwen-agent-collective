<!doctype html>
<meta charset="utf-8">
<title>Repo Docs</title>
<!-- ponytail: marked from CDN (this repo already uses CDN libs) instead of a hand-rolled md parser.
     Renders any repo .md live via ?file= — no copy of the content, the .md stays the single source.
     Must be SERVED (browsers block fetch() over file://):  python3 -m http.server 8000
     then open  http://localhost:8000/viewer.html  -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --bg:#0b0d12; --panel:#12151c; --border:#222733; --text:#e6e9ef; --muted:#8b93a7; --accent:#7c6cf5; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; display:flex; }
  nav { width:230px; min-height:100vh; background:var(--panel); border-right:1px solid var(--border); padding:1rem; position:sticky; top:0; }
  nav h1 { font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:.2rem 0 1rem; }
  nav a { display:block; padding:.4rem .6rem; color:var(--muted); text-decoration:none; border-radius:6px; font-size:.85rem; }
  nav a:hover { background:rgba(255,255,255,.04); color:var(--text); }
  nav a.active { background:var(--accent); color:#fff; }
  main { flex:1; max-width:860px; padding:2.5rem 3rem; }
  main h1,main h2,main h3 { line-height:1.25; }
  main h2 { border-bottom:1px solid var(--border); padding-bottom:.3rem; margin-top:2.2rem; }
  main hr { border:none; border-top:1px solid var(--border); margin:2rem 0; }
  main a { color:var(--accent); }
  main code { background:#1b202b; padding:.15em .4em; border-radius:4px; font-size:.88em; }
  main pre { background:#1b202b; padding:1rem; border-radius:8px; overflow:auto; }
  table { border-collapse:collapse; width:100%; margin:1rem 0; }
  th,td { border:1px solid var(--border); padding:.5rem .75rem; text-align:left; }
  th { background:#1b202b; color:var(--muted); font-weight:600; }
  blockquote { border-left:3px solid var(--accent); margin:1rem 0; padding:.2rem 1rem; color:var(--muted); }
  .err { color:#ff8080; }
</style>
<nav>
  <h1>Repo Docs</h1>
  <div id="links"></div>
</nav>
<main id="content">Loading…</main>
<script>
  // Hardcoded nav — laziest way to list docs without a server-side directory endpoint.
  const DOCS = [
    ["HACKATHON.md", "📋 Hackathon Board"],
    ["KICKOFF.md", "🚀 Kickoff Roadmap"],
    ["README.md", "📖 Project README"],
    ["brain/README.md", "🧠 Brain"],
    ["shared/README.md", "🔗 Shared Namespaces"],
    ["agents/memory-echo/PLAN.md", "Track 1 · memory-echo"],
    ["agents/showrunner/PLAN.md", "Track 2 · showrunner"],
    ["agents/git-committer/PLAN.md", "Track 3 · git-committer"],
    ["agents/open-translate/PLAN.md", "Track 4 · open-translate"],
    ["agents/skippy-concierge/PLAN.md", "Track 5 · skippy-concierge"],
  ];
  const file = (new URLSearchParams(location.search).get("file") || "HACKATHON.md").replace(/^\/+/, "");
  document.getElementById("links").innerHTML = DOCS.map(([f, label]) =>
    `<a href="?file=${encodeURIComponent(f)}" class="${f === file ? "active" : ""}">${label}</a>`
  ).join("");

  fetch(file)
    .then(r => { if (!r.ok) throw new Error(r.status + " " + r.statusText); return r.text(); })
    .then(md => { document.getElementById("content").innerHTML = marked.parse(md); document.title = file; })
    .catch(e => {
      document.getElementById("content").innerHTML =
        `<p class="err">Could not load <code>${file}</code>: ${e.message}</p>` +
        `<p class="err">If this says "Failed to fetch", you opened the page as a file://. ` +
        `Serve the repo instead:<br><code>python3 -m http.server 8000</code><br>` +
        `then open <code>http://localhost:8000/viewer.html</code></p>`;
    });
</script>
