<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Viz — Memory Constellation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      color: #c9d6f0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── title ── */
    #title-bar {
      position: absolute;
      top: 18px;
      left: 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    #title-bar h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #e8eeff;
      text-shadow: 0 0 18px rgba(120,160,255,0.6);
    }
    #title-bar span {
      font-size: 11px;
      color: #5a6a9a;
      letter-spacing: 0.1em;
    }

    /* ── event card ── */
    #event-card {
      position: absolute;
      top: 18px;
      right: 24px;
      width: 320px;
      background: rgba(8, 12, 28, 0.85);
      border: 1px solid rgba(80, 120, 220, 0.25);
      border-radius: 10px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
      transition: border-color 0.4s;
    }
    #event-card.ingest  { border-color: rgba(80, 220, 140, 0.5); }
    #event-card.forget  { border-color: rgba(220, 80, 80, 0.5); }
    #event-card.recall  { border-color: rgba(80, 160, 255, 0.5); }

    #event-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .badge-ingest { background: rgba(80, 220, 140, 0.18); color: #50dc8c; }
    .badge-forget { background: rgba(220, 80, 80, 0.18); color: #e05060; }
    .badge-recall { background: rgba(80, 160, 255, 0.18); color: #60b0ff; }

    #event-title {
      font-size: 13px;
      font-weight: 600;
      color: #dde6ff;
      margin-bottom: 6px;
    }
    #event-text {
      font-size: 11px;
      color: #7888b0;
      line-height: 1.6;
    }
    #event-time {
      font-size: 10px;
      color: #3a4a70;
      margin-top: 8px;
    }

    /* ── legend ── */
    #legend {
      position: absolute;
      bottom: 120px;
      left: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #5a6a9a;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── stats ── */
    #stats {
      position: absolute;
      bottom: 120px;
      right: 24px;
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-row {
      font-size: 11px;
      color: #3a4a70;
    }
    .stat-val {
      color: #8898c8;
      margin-left: 6px;
    }

    /* ── controls ── */
    #controls {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(8, 12, 28, 0.88);
      border: 1px solid rgba(80, 120, 220, 0.2);
      border-radius: 12px;
      padding: 12px 22px;
      pointer-events: all;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .ctrl-btn {
      background: rgba(60, 90, 200, 0.18);
      border: 1px solid rgba(80, 120, 220, 0.35);
      color: #a0b4e0;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.05em;
    }
    .ctrl-btn:hover {
      background: rgba(80, 120, 255, 0.3);
      color: #dde6ff;
    }
    .ctrl-btn:active { transform: scale(0.97); }

    .ctrl-sep {
      width: 1px;
      height: 28px;
      background: rgba(80, 120, 220, 0.2);
    }

    .ctrl-label {
      font-size: 11px;
      color: #3a4a70;
      letter-spacing: 0.08em;
    }

    #budget-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      background: rgba(60, 90, 200, 0.3);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #budget-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #5090ff;
      box-shadow: 0 0 8px rgba(80, 144, 255, 0.6);
      cursor: pointer;
    }
    #budget-val {
      font-size: 13px;
      color: #60b0ff;
      min-width: 18px;
      text-align: center;
    }

    #progress-bar-wrap {
      position: absolute;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      max-width: calc(100vw - 48px);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #progress-track {
      flex: 1;
      height: 3px;
      background: rgba(60, 90, 200, 0.2);
      border-radius: 2px;
      position: relative;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3060c0, #5090ff);
      border-radius: 2px;
      transition: width 0.3s;
      box-shadow: 0 0 6px rgba(80, 144, 255, 0.5);
    }
    #progress-label {
      font-size: 10px;
      color: #3a4a70;
      min-width: 60px;
      text-align: right;
    }

    /* ── tooltip ── */
    #tooltip {
      position: absolute;
      background: rgba(8, 12, 28, 0.95);
      border: 1px solid rgba(80, 120, 220, 0.4);
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 11px;
      line-height: 1.6;
      max-width: 260px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 20;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-subject { color: #dde6ff; font-weight: 600; }
    #tooltip .tt-pred   { color: #5a6a9a; }
    #tooltip .tt-object { color: #9abaee; }
    #tooltip .tt-meta   { color: #3a4a70; font-size: 10px; margin-top: 6px; }
    #tooltip .tt-conf   { display: inline-block; margin-left: 6px; }
    #tooltip .tt-status { display: inline-block; margin-left: 6px; text-transform: uppercase; font-size: 9px; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <div id="title-bar">
    <h1>BRAIN VIZ</h1>
    <span>MEMORY CONSTELLATION</span>
  </div>

  <div id="event-card">
    <div id="event-type-badge">—</div>
    <div id="event-title">Waiting to play…</div>
    <div id="event-text">Press Play to begin the memory timeline.</div>
    <div id="event-time">—</div>
  </div>

  <div id="legend"></div>

  <div id="stats">
    <div class="stat-row">active facts <span class="stat-val" id="stat-active">0</span></div>
    <div class="stat-row">forgotten     <span class="stat-val" id="stat-forgotten">0</span></div>

  <div id="progress-bar-wrap">
    <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>

  <div id="controls">

    <input type="range" id="budget-slider" min="1" max="10" value="5" />

  </div>
</div>

<div id="tooltip"></div>

<!-- Three.js from CDN (no build step needed) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════════════
   DATA CONTRACT — swap loadEvents() to wire live brain API
   See README.md for the full spec.
═══════════════════════════════════════════════════════════ */
async function loadEvents() {
  // SEAM: replace this fetch with your live orchestrator API call.
  // e.g. const res = await fetch('http://localhost:4000/api/brain/timeline');
  const res = await fetch('./sample-events.json');
  return res.json(); // { facts: Fact[], events: Event[] }
}

/* ═══════════════════════════════════════════════════════════
   NAMESPACE COLOR MAP
═══════════════════════════════════════════════════════════ */
const NS_COLORS = {
  'echo.private':            { hex: '#ff6b6b', hsl: [0,   0.88, 0.58] },
  'shared.code-conventions': { hex: '#ffd166', hsl: [44,  1.0,  0.56] },
  'shared.glossary':         { hex: '#06d6a0', hsl: [163, 0.92, 0.43] },
  'skippy.private':          { hex: '#a78bfa', hsl: [258, 0.87, 0.73] },
  'devices':                 { hex: '#38bdf8', hsl: [200, 0.93, 0.60] },
};

const NS_ORDER = Object.keys(NS_COLORS);

function nsColor(ns) {
  return new THREE.Color(NS_COLORS[ns]?.hex ?? '#8888aa');
}

/* ═══════════════════════════════════════════════════════════
   BUILD LEGEND
═══════════════════════════════════════════════════════════ */
const legendEl = document.getElementById('legend');
NS_ORDER.forEach(ns => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${NS_COLORS[ns].hex};box-shadow:0 0 6px ${NS_COLORS[ns].hex}88"></div><span>${ns}</span>`;
  legendEl.appendChild(item);
});

/* ═══════════════════════════════════════════════════════════
   THREE.JS SCENE SETUP
═══════════════════════════════════════════════════════════ */
const container = document.getElementById('canvas-container');
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x050810, 1);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 1000);
camera.position.set(0, 12, 48);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 8;
controls.maxDistance = 120;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.18;

/* ── Starfield background ── */
{
  const count = 1800;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 380;
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0x334466, size: 0.35, sizeAttenuation: true });
  scene.add(new THREE.Points(geo, mat));
}

/* ── Ambient + directional light (for future mesh nodes) ── */
scene.add(new THREE.AmbientLight(0x112244, 2.0));
const dLight = new THREE.DirectionalLight(0x6688ff, 1.2);
dLight.position.set(30, 40, 20);
scene.add(dLight);

/* ═══════════════════════════════════════════════════════════
   NAMESPACE CLUSTER POSITIONS
   Each namespace gets a "home" region in 3-D space.
═══════════════════════════════════════════════════════════ */
const NS_CLUSTERS = {
  'echo.private':            new THREE.Vector3(-18,  4,  -2),
  'shared.code-conventions': new THREE.Vector3(  2, 10,  -8),
  'shared.glossary':         new THREE.Vector3( 12, -4,   2),
  'skippy.private':          new THREE.Vector3(-10, -8,  10),
  'devices':                 new THREE.Vector3( 16,  6,  14),
};

function clusterPos(ns) {
  const c = NS_CLUSTERS[ns] ?? new THREE.Vector3(0, 0, 0);
  return new THREE.Vector3(
    c.x + (Math.random() - 0.5) * 9,
    c.y + (Math.random() - 0.5) * 9,
    c.z + (Math.random() - 0.5) * 9,
  );
}

/* ═══════════════════════════════════════════════════════════
   NODE MANAGEMENT
═══════════════════════════════════════════════════════════ */
// One group per fact node so we can add glow mesh children
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

// factId -> { mesh, glowMesh, fact, state, targetPos, currentPos, velocity, opacity }
const nodeMap = new Map();

const SPHERE_SEGS = 20;

function createNodeMeshes(fact) {
  const radius = 0.28 + fact.confidence * 0.55;
  const col = nsColor(fact.namespace);

  // Core sphere
  const geo = new THREE.SphereGeometry(radius, SPHERE_SEGS, SPHERE_SEGS);
  const mat = new THREE.MeshStandardMaterial({
    color: col,
    emissive: col,
    emissiveIntensity: 0.6,
    roughness: 0.3,
    metalness: 0.4,
    transparent: true,
    opacity: 1,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.factId = fact.id;

  // Glow sprite (billboard)
  const glowGeo = new THREE.SphereGeometry(radius * 2.6, 10, 10);
  const glowMat = new THREE.MeshBasicMaterial({
    color: col,
    transparent: true,
    opacity: 0.12,
    depthWrite: false,
    side: THREE.BackSide,
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);

  return { mesh, glowMesh };
}

function addFact(fact, startFromAbove = true) {
  if (nodeMap.has(fact.id)) return;
  const target = clusterPos(fact.namespace);
  const spawn = target.clone().add(new THREE.Vector3(
    (Math.random() - 0.5) * 4,
    22 + Math.random() * 12,
    (Math.random() - 0.5) * 4,
  ));

  const { mesh, glowMesh } = createNodeMeshes(fact);
  mesh.position.copy(startFromAbove ? spawn : target);
  glowMesh.position.copy(mesh.position);

  const pivot = new THREE.Group();
  pivot.add(mesh);
  pivot.add(glowMesh);
  pivot.position.set(0, 0, 0);
  nodeGroup.add(pivot);

  // wire mesh position directly since group is at origin
  mesh.position.copy(startFromAbove ? spawn : target);
  glowMesh.position.copy(mesh.position);

  nodeMap.set(fact.id, {
    mesh,
    glowMesh,
    pivot,
    fact,
    state: 'arriving',   // arriving | settled | fading | forgotten | highlighted | dimmed
    targetPos: target,
    opacity: 0,
    glowOpacity: 0.12,
    velocity: new THREE.Vector3(0, 0, 0),
    highlightIntensity: 0,
  });

  // Start invisible, fade in
  mesh.material.opacity = 0;
  glowMesh.material.opacity = 0;
}

function forgetFact(factId) {
  const node = nodeMap.get(factId);
  if (!node) return;
  node.state = 'fading';
}

function recallFacts(refs, budget) {
  // First reset all settled nodes to 'dimmed'
  for (const [id, node] of nodeMap) {
    if (node.state === 'settled' || node.state === 'dimmed' || node.state === 'highlighted') {
      node.state = 'dimmed';
      node.highlightIntensity = 0;
    }
  }

  // Highlight up to `budget` refs
  const toHighlight = refs.slice(0, budget);
  toHighlight.forEach(id => {
    const node = nodeMap.get(id);
    if (node) {
      node.state = 'highlighted';
      node.highlightIntensity = 1.0;
    }
  });
}

function resetRecall() {
  for (const [id, node] of nodeMap) {
    if (node.state === 'highlighted' || node.state === 'dimmed') {
      node.state = 'settled';
      node.highlightIntensity = 0;
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   EDGE / CONNECTION LINES (drawn during recall)
═══════════════════════════════════════════════════════════ */
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);
let activeEdges = [];

function clearEdges() {
  activeEdges.forEach(l => edgeGroup.remove(l));
  activeEdges = [];
}

function drawRecallEdges(refs, budget) {
  clearEdges();
  const highlighted = refs.slice(0, budget);
  if (highlighted.length < 2) return;

  // Draw star pattern from centroid
  const positions = highlighted.map(id => nodeMap.get(id)?.mesh.position).filter(Boolean);
  if (positions.length < 2) return;

  const centroid = new THREE.Vector3();
  positions.forEach(p => centroid.add(p));
  centroid.divideScalar(positions.length);

  positions.forEach(p => {
    const pts = [centroid.clone(), p.clone()];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
      color: 0x5090ff,
      transparent: true,
      opacity: 0.45,
      depthWrite: false,
    });
    const line = new THREE.Line(geo, mat);
    edgeGroup.add(line);
    activeEdges.push(line);
  });
}

/* ═══════════════════════════════════════════════════════════
   PARTICLE BURST (ingest / forget effects)
═══════════════════════════════════════════════════════════ */
const particlePool = [];
const activeParticles = [];

function burst(position, color, count = 18, up = true) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color,
    size: 0.22,
    transparent: true,
    opacity: 1,
    depthWrite: false,
    sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  const velocities = [];
  for (let i = 0; i < count; i++) {
    const v = new THREE.Vector3(
      (Math.random() - 0.5) * 0.18,
      up ? (Math.random() * 0.12 + 0.04) : -(Math.random() * 0.12 + 0.04),
      (Math.random() - 0.5) * 0.18,
    );
    velocities.push(v);
    pos[i*3]   = position.x;
    pos[i*3+1] = position.y;
    pos[i*3+2] = position.z;
  }
  geo.attributes.position.needsUpdate = true;

  activeParticles.push({ pts, velocities, age: 0, maxAge: 90, count, up });
}

function updateParticles() {
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.age++;
    const t = p.age / p.maxAge;
    p.pts.material.opacity = Math.max(0, 1 - t * t);

    const pos = p.pts.geometry.attributes.position.array;
    for (let j = 0; j < p.count; j++) {
      pos[j*3]   += p.velocities[j].x;
      pos[j*3+1] += p.velocities[j].y;
      pos[j*3+2] += p.velocities[j].z;
      p.velocities[j].y -= 0.003;
    }
    p.pts.geometry.attributes.position.needsUpdate = true;

    if (p.age >= p.maxAge) {
      scene.remove(p.pts);
      p.pts.geometry.dispose();
      p.pts.material.dispose();
      activeParticles.splice(i, 1);
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════ */
const tooltip = document.getElementById('tooltip');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-9999, -9999);

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 14) + 'px';
});

function updateTooltip() {
  raycaster.setFromCamera(mouse, camera);
  const meshes = [...nodeMap.values()]
    .filter(n => n.state !== 'forgotten')
    .map(n => n.mesh);

  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) {
    const fid = hits[0].object.userData.factId;
    const node = nodeMap.get(fid);
    if (node) {
      const f = node.fact;
      const ns_col = NS_COLORS[f.namespace]?.hex ?? '#aaa';
      const conf_pct = Math.round(f.confidence * 100);
      const status_colors = { approved: '#50dc8c', pending: '#ffd166', expired: '#e05060' };
      tooltip.innerHTML = `
        <div class="tt-subject">${f.subject}</div>
        <div class="tt-pred">${f.predicate}</div>
        <div class="tt-object">${f.object_text}</div>
        <div class="tt-meta">
          <span style="color:${ns_col}">${f.namespace}</span>
          <span class="tt-conf" style="color:${ns_col}">${conf_pct}% confidence</span>
          <span class="tt-status" style="color:${status_colors[f.status] ?? '#aaa'}">${f.status}</span>
        </div>
      `;
      tooltip.classList.add('visible');
      return;
    }
  }
  tooltip.classList.remove('visible');
}

/* ═══════════════════════════════════════════════════════════
   ANIMATION LOOP — per-frame node state machine
═══════════════════════════════════════════════════════════ */
function updateNodes(dt) {
  for (const [id, node] of nodeMap) {
    const { mesh, glowMesh, state, targetPos } = node;

    if (state === 'forgotten') continue;

    // --- physics: spring towards target ---
    if (state === 'arriving' || state === 'settled') {
      const diff = targetPos.clone().sub(mesh.position);
      const dist = diff.length();
      if (dist > 0.01) {
        node.velocity.add(diff.multiplyScalar(0.022));
        node.velocity.multiplyScalar(0.82);
        mesh.position.add(node.velocity);
      } else {
        if (state === 'arriving') {
          node.state = 'settled';
          burst(mesh.position.clone(), nsColor(node.fact.namespace), 16, true);
        }
      }
    }

    // --- fading (forget) ---
    if (state === 'fading') {
      mesh.position.y -= 0.04;
      node.opacity = Math.max(0, (node.opacity ?? 1) - 0.018);
      if (node.opacity <= 0) {
        node.state = 'forgotten';
        node.mesh.visible = false;
        node.glowMesh.visible = false;
        burst(mesh.position.clone(), new THREE.Color(0xe05060), 22, false);
        updateStats();
        continue;
      }
    }

    // --- highlighted / dimmed (recall) ---
    if (state === 'highlighted') {
      node.highlightIntensity = Math.min(1, (node.highlightIntensity ?? 0) + 0.05);
    } else if (state === 'dimmed') {
      node.highlightIntensity = Math.max(0, (node.highlightIntensity ?? 0) - 0.03);
    }

    // compute opacity target
    let opacityTarget = 1.0;
    let glowTarget = 0.12;
    let emissiveBoost = 0.6;

    if (state === 'arriving') {
      opacityTarget = Math.min(1, (node.opacity ?? 0) + 0.04);
    } else if (state === 'fading') {
      opacityTarget = node.opacity;
      glowTarget = node.opacity * 0.08;
    } else if (state === 'highlighted') {
      opacityTarget = 1.0;
      glowTarget = 0.35 + node.highlightIntensity * 0.45;
      emissiveBoost = 1.6 + node.highlightIntensity * 1.4;
    } else if (state === 'dimmed') {
      opacityTarget = 0.2 + node.highlightIntensity * 0.15;
      glowTarget = 0.04;
      emissiveBoost = 0.2;
    }

    node.opacity = opacityTarget;
    mesh.material.opacity = opacityTarget;
    glowMesh.material.opacity = glowTarget;
    mesh.material.emissiveIntensity = emissiveBoost;

    // pulse on highlight
    if (state === 'highlighted') {
      const pulse = 1 + 0.08 * Math.sin(Date.now() * 0.004 + id.charCodeAt(1));
      mesh.scale.setScalar(pulse);
      glowMesh.scale.setScalar(pulse);
    } else {
      mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
      glowMesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
    }

    glowMesh.position.copy(mesh.position);
  }
}

/* ═══════════════════════════════════════════════════════════
   TIMELINE PLAYBACK
═══════════════════════════════════════════════════════════ */
let allFacts = [];
let allEvents = [];
let currentEventIdx = -1;
let isPlaying = false;
let playTimer = null;
let contextBudget = 5;
let lastRecallRefs = [];

const eventCard   = document.getElementById('event-card');
const evTypeBadge = document.getElementById('event-type-badge');
const evTitle     = document.getElementById('event-title');
const evText      = document.getElementById('event-text');
const evTime      = document.getElementById('event-time');
const progressFill = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');

function updateStats() {
  const active = [...nodeMap.values()].filter(n => n.state !== 'forgotten').length;
  const forgotten = [...nodeMap.values()].filter(n => n.state === 'forgotten').length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-forgotten').textContent = forgotten;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showEvent(ev) {
  const typeMap = {
    ingest: { badge: 'badge-ingest', label: 'INGEST ✦' },
    forget: { badge: 'badge-forget', label: 'FORGET ✕' },
    recall: { badge: 'badge-recall', label: 'RECALL ◈' },
  };
  const tm = typeMap[ev.event_type] ?? { badge: '', label: ev.event_type };

  eventCard.className = ev.event_type;
  evTypeBadge.className = `${tm.badge}`;
  evTypeBadge.textContent = tm.label;
  evTitle.textContent = ev.title;
  evText.textContent = ev.event_text;
  evTime.textContent = formatTime(ev.event_time);

  // Update last recall stat
  if (ev.event_type === 'recall') {
    const shown = Math.min(ev.refs.length, contextBudget);
    document.getElementById('stat-recall').textContent = `${shown} / ${ev.refs.length} facts`;
  }
}

function applyEvent(ev) {
  showEvent(ev);
  clearEdges();

  if (ev.event_type === 'ingest') {
    resetRecall();
    ev.refs.forEach(id => {
      const fact = allFacts.find(f => f.id === id);
      if (fact) addFact(fact, true);
    });
  } else if (ev.event_type === 'forget') {
    resetRecall();
    ev.refs.forEach(id => forgetFact(id));
  } else if (ev.event_type === 'recall') {
    lastRecallRefs = ev.refs;
    recallFacts(ev.refs, contextBudget);
    drawRecallEdges(ev.refs, contextBudget);
  }

  updateStats();
}

function stepForward() {
  if (currentEventIdx < allEvents.length - 1) {
    currentEventIdx++;
    applyEvent(allEvents[currentEventIdx]);
    updateProgress();
  } else {
    stopPlay();
  }
}

function updateProgress() {
  const pct = allEvents.length > 0
    ? ((currentEventIdx + 1) / allEvents.length) * 100
    : 0;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${currentEventIdx + 1} / ${allEvents.length}`;
}

function startPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  controls.autoRotate = true;
  scheduleNext();
}

function scheduleNext() {
  if (!isPlaying) return;
  // Vary delay: recall events linger longer
  const ev = allEvents[currentEventIdx];
  const delay = ev && ev.event_type === 'recall' ? 3200 : 2200;
  playTimer = setTimeout(() => {
    stepForward();
    if (isPlaying && currentEventIdx < allEvents.length - 1) {
      scheduleNext();
    } else {
      stopPlay();
    }
  }, delay);
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playTimer);
  document.getElementById('btn-play').textContent = '▶ Play';
}

/* ═══════════════════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════════════════ */
document.getElementById('btn-play').addEventListener('click', () => {
  if (isPlaying) { stopPlay(); } else { startPlay(); }
});

document.getElementById('btn-step').addEventListener('click', () => {
  stopPlay();
  stepForward();
});

const budgetSlider = document.getElementById('budget-slider');
const budgetVal    = document.getElementById('budget-val');
budgetSlider.addEventListener('input', () => {
  contextBudget = parseInt(budgetSlider.value);
  budgetVal.textContent = contextBudget;
  // If currently showing a recall event, re-apply with new budget
  const ev = allEvents[currentEventIdx];
  if (ev && ev.event_type === 'recall') {
    recallFacts(lastRecallRefs, contextBudget);
    drawRecallEdges(lastRecallRefs, contextBudget);
    const shown = Math.min(lastRecallRefs.length, contextBudget);
    document.getElementById('stat-recall').textContent = `${shown} / ${lastRecallRefs.length} facts`;
  }
});

/* ═══════════════════════════════════════════════════════════
   MAIN RENDER LOOP
═══════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  controls.update();
  updateNodes(dt);
  updateParticles();
  updateTooltip();
  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

/* ═══════════════════════════════════════════════════════════
   INIT — load data, seed initial state, then animate
═══════════════════════════════════════════════════════════ */
async function init() {
  const data = await loadEvents();
  allFacts  = data.facts;
  allEvents = data.events;

  // Sort events chronologically
  allEvents.sort((a, b) => new Date(a.event_time) - new Date(b.event_time));

  budgetSlider.max = Math.max(3, allFacts.length);
  budgetSlider.value = contextBudget;
  updateProgress();

  // Pre-scatter all approved facts so the constellation looks alive from frame 0
  allFacts
    .filter(f => f.status === 'approved' || f.status === 'pending')
    .forEach(f => addFact(f, false));

  updateStats();
  animate();
}

init().catch(err => {
  console.error('Brain viz init error:', err);
  evText.textContent = `Error loading data: ${err.message}`;
});
</script>
