version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: brain_demo_postgres
    environment:
      POSTGRES_DB: collective
      POSTGRES_USER: collective
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - ../db/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collective -d collective"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s
